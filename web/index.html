<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Device Auto Dashboard (Central Python)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Device Auto Dashboard (Central Python)</h1>
      <div class="actions">
        <button id="reload">Reload devices</button>
        <label>
          Interval (ms)
          <input id="interval" type="number" value="1200" min="300" step="100" />
        </label>
      </div>
    </header>

    <section class="grid">
      <div class="card">
        <h2>Devices</h2>
        <div id="devices" class="devices"></div>
      </div>

      <div class="card">
        <h2>Live Logs</h2>
        <div id="logs" class="logs"></div>
      </div>
    </section>

    <p class="hint">
      Start = spawn a long-running <code>auto_puzzle.py</code> per device. Logs are streamed via SSE.
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
