<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Android Bot Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="stack">

      <!-- DEVICES -->
      <div class="card">
        <div class="cardhead">
          <h2>Devices</h2>
          
          <div class="cardactions">
            <input id="deviceSearch" type="text" placeholder="Search device..." class="search" />
            <input id="deviceAdd" type="text" placeholder="Add device id..." class="search" />
            <button id="addDeviceBtn">Add</button>

            <button id="startAll">Start all</button>
            <button id="stopAll">Stop all</button>
          </div>
        </div>
        <div id="devices" class="devices"></div>
      </div>

      <!-- LOGS -->
      <div class="card" id="logsCard">
        <div class="cardhead">
          <h2>Live Logs</h2>
          <div class="cardactions">
            <select id="logDeviceFilter" class="select">
              <option value="">All devices</option>
            </select>

            <button id="toggleLogs">Hide</button>
            <button id="clearLogs">Clear</button>

            <label class="chk">
              <input id="autoScroll" type="checkbox" checked />
              Auto-scroll
            </label>
          </div>
        </div>
        <div id="logs" class="logs"></div>
      </div>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
